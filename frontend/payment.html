<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>VRVS Payment</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <div class="overlay">

    <div class="container">

      <h1>Payment Details</h1>

      <!-- BOOKING INFO -->

      <div id="bookingInfo"></div>

      <!-- PAYMENT FORM -->

      <form id="paymentForm" novalidate>

        <label>
          Cardholder Name
        </label>

        <input
          type="text"
          id="cardName"
        >

        <label>
          Card Number
        </label>

        <input
          type="text"
          id="cardNumber"
          maxlength="16"
        >

        <label>
          CVV
        </label>

        <input
          type="password"
          id="cvv"
          maxlength="3"
        >

        <button type="submit">

          Pay Now

        </button>

      </form>

    </div>

  </div>

  <script src="payment.js"></script>

</body>

</html>
